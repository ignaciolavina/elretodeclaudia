<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>El Reto de Claudia</title>
    <script>
      // GitHub Pages SPA redirect: encode path as query param and redirect to root
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1).join('/') +
        '/?p=' + encodeURIComponent(l.pathname + l.search) +
        (l.hash || '')
      );
    </script>
  </head>
  <body></body>
</html>
