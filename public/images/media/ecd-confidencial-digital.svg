<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 120" width="600" height="120">
  <rect width="600" height="120" fill="white"/>
  <!-- ECD letters -->
  <text x="10" y="105"
    font-family="'Arial Black', 'Impact', sans-serif"
    font-size="108"
    font-weight="900"
    fill="#1A3A6E"
  >EC</text>
  <text x="185" y="105"
    font-family="'Arial Black', 'Impact', sans-serif"
    font-size="108"
    font-weight="900"
    fill="#E8A020"
